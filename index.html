<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a1628" />
  <meta name="description" content="Copa do Mundo 2026 — Calendário, Resultados e Ao Vivo" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Copa 2026" />
  <title>Copa do Mundo 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
/* ============================================================
   COPA DO MUNDO 2026 — Estilos
   Dark theme · Gold accents · Scoreboard aesthetic
   ============================================================ */

:root {
  --bg-deep:    #060d1a;
  --bg-card:    #0d1c35;
  --bg-card2:   #0f2040;
  --bg-surface: #162b4a;
  --gold:       #c9a227;
  --gold-light: #e8c547;
  --gold-dim:   #7a6118;
  --green:      #09d17a;
  --red:        #ff4455;
  --blue-acc:   #3a8fff;
  --text-pri:   #f0f4ff;
  --text-sec:   #7a9cc0;
  --text-muted: #3d5a80;
  --border:     rgba(201, 162, 39, 0.15);
  --border-dim: rgba(255,255,255,0.06);
  --shadow:     0 4px 24px rgba(0,0,0,0.5);
  --radius:     12px;
  --radius-sm:  8px;
  --header-h:   64px;
  --nav-h:      52px;
  --font-display: 'Barlow Condensed', 'Arial Narrow', sans-serif;
  --font-body:    'Barlow', 'Arial', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 16px; }

body {
  font-family: var(--font-body);
  background: var(--bg-deep);
  color: var(--text-pri);
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── Scrollbar ──────────────────────────────────────────── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg-deep); }
::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 2px; }

/* ── Header ─────────────────────────────────────────────── */
.app-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--header-h);
  background: linear-gradient(180deg, #050c18 0%, rgba(5,12,24,0.96) 100%);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  z-index: 100;
}

.header-inner {
  max-width: 600px;
  margin: 0 auto;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
}

.header-brand { display: flex; align-items: center; gap: 10px; }

.trophy-icon {
  font-size: 28px;
  filter: drop-shadow(0 0 8px rgba(201,162,39,0.6));
}

.brand-text { display: flex; flex-direction: column; }

.brand-title {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 900;
  color: var(--text-pri);
  letter-spacing: 2px;
  line-height: 1;
}

.brand-year {
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 600;
  color: var(--gold);
  letter-spacing: 1px;
}

.header-meta { display: flex; align-items: center; gap: 12px; }

.host-flags { font-size: 20px; letter-spacing: 2px; }

.live-badge {
  display: flex;
  align-items: center;
  gap: 5px;
  background: rgba(255, 68, 85, 0.15);
  border: 1px solid rgba(255, 68, 85, 0.4);
  color: var(--red);
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  padding: 3px 8px;
  border-radius: 20px;
}

.live-dot, .pulse-dot {
  width: 6px; height: 6px;
  background: var(--red);
  border-radius: 50%;
  animation: pulse-red 1.2s ease-in-out infinite;
}

@keyframes pulse-red {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.7); }
}

/* ── Nav Tabs ───────────────────────────────────────────── */
.main-nav {
  position: fixed;
  top: var(--header-h);
  left: 0; right: 0;
  height: var(--nav-h);
  background: rgba(6, 13, 26, 0.98);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border-dim);
  display: flex;
  align-items: stretch;
  justify-content: space-around;
  z-index: 99;
  max-width: 100%;
}

.nav-tab {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  background: none;
  border: none;
  color: var(--text-muted);
  font-family: var(--font-display);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: color 0.2s;
  border-bottom: 2px solid transparent;
  position: relative;
}

.nav-tab:hover { color: var(--text-sec); }

.nav-tab.active {
  color: var(--gold);
  border-bottom-color: var(--gold);
}

.nav-tab svg { transition: stroke 0.2s; }

/* ── Main Content ───────────────────────────────────────── */
.app-main {
  margin-top: calc(var(--header-h) + var(--nav-h));
  max-width: 600px;
  margin-left: auto;
  margin-right: auto;
  padding: 16px 12px 80px;
}

.tab-section { display: none; }
.tab-section.active { display: block; animation: fadeIn 0.25s ease; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

.section-header {
  margin-bottom: 16px;
}

.section-title {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 900;
  color: var(--text-pri);
  letter-spacing: 1px;
}

.section-subtitle {
  font-size: 13px;
  color: var(--text-sec);
  margin-top: 4px;
}

.section-date {
  font-size: 13px;
  color: var(--text-sec);
  text-transform: capitalize;
}

/* ── Filters ────────────────────────────────────────────── */
.filter-row {
  display: flex;
  gap: 8px;
  margin-top: 10px;
  flex-wrap: wrap;
}

.filter-select {
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-pri);
  font-family: var(--font-body);
  font-size: 13px;
  padding: 6px 10px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  outline: none;
  flex: 1;
  min-width: 140px;
}

.filter-select:focus { border-color: var(--gold); }

/* ── Match Card ─────────────────────────────────────────── */
.match-card {
  background: var(--bg-card);
  border: 1px solid var(--border-dim);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 10px;
  transition: transform 0.15s, border-color 0.15s;
}

.match-card:hover { transform: translateY(-1px); }

.match-brazil {
  border-color: rgba(201, 162, 39, 0.35);
  background: linear-gradient(135deg, var(--bg-card) 0%, rgba(201, 162, 39, 0.06) 100%);
}

.match-live-card {
  border-color: rgba(9, 209, 122, 0.3);
  background: linear-gradient(135deg, var(--bg-card) 0%, rgba(9, 209, 122, 0.05) 100%);
  animation: live-pulse-border 2s ease-in-out infinite;
}

@keyframes live-pulse-border {
  0%, 100% { border-color: rgba(9, 209, 122, 0.3); }
  50% { border-color: rgba(9, 209, 122, 0.6); }
}

.match-card-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.match-meta { display: flex; align-items: center; gap: 8px; }

.match-venue {
  font-size: 11px;
  color: var(--text-muted);
}

.match-teams {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

.team-side {
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 1;
}

.team-home { justify-content: flex-start; }
.team-away { justify-content: flex-end; }

.team-flag { font-size: 26px; line-height: 1; }

.team-name {
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 700;
  color: var(--text-pri);
  letter-spacing: 0.5px;
}

/* ── Score Display ──────────────────────────────────────── */
.score-display {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  background: var(--bg-deep);
  border: 1px solid var(--border-dim);
  border-radius: var(--radius-sm);
  min-width: 80px;
  justify-content: center;
}

.score-live {
  border-color: rgba(9, 209, 122, 0.4);
  background: rgba(9, 209, 122, 0.08);
}

.score-upcoming {
  border-color: var(--border);
}

.score-num {
  font-family: var(--font-display);
  font-size: 24px;
  font-weight: 900;
  color: var(--text-pri);
  line-height: 1;
}

.score-sep {
  font-family: var(--font-display);
  font-size: 18px;
  color: var(--text-muted);
}

.match-time {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 700;
  color: var(--gold);
}

.match-tz {
  font-size: 10px;
  color: var(--text-muted);
}

/* ── Badges ─────────────────────────────────────────────── */
.badge {
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.5px;
  padding: 3px 8px;
  border-radius: 20px;
  display: flex;
  align-items: center;
  gap: 4px;
}

.badge-live {
  background: rgba(9, 209, 122, 0.15);
  border: 1px solid rgba(9, 209, 122, 0.4);
  color: var(--green);
}

.badge-done {
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border-dim);
  color: var(--text-sec);
}

.badge-upcoming {
  background: rgba(201, 162, 39, 0.1);
  border: 1px solid rgba(201, 162, 39, 0.3);
  color: var(--gold);
}

.group-badge {
  font-family: var(--font-display);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  color: var(--text-muted);
  background: rgba(255,255,255,0.05);
  padding: 2px 7px;
  border-radius: 4px;
  text-transform: uppercase;
}

/* ── Match Events ───────────────────────────────────────── */
.match-events {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border-dim);
}

.event-chip {
  font-size: 11px;
  color: var(--text-sec);
  background: rgba(255,255,255,0.04);
  padding: 2px 8px;
  border-radius: 20px;
}

/* ── Match Sections ─────────────────────────────────────── */
.match-section { margin-bottom: 20px; }

.match-section-header {
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1px;
  color: var(--text-sec);
  text-transform: uppercase;
  margin-bottom: 10px;
  padding-left: 4px;
}

.date-group { margin-bottom: 20px; }

.date-label {
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 1px;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 10px;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
}

/* ── Countdown Card ─────────────────────────────────────── */
.countdown-card {
  background: linear-gradient(135deg, var(--bg-card2) 0%, #0a1e3a 100%);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  text-align: center;
  margin-bottom: 20px;
}

.countdown-label {
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--text-sec);
  text-transform: uppercase;
  margin-bottom: 16px;
}

.countdown-numbers {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
}

.countdown-unit { display: flex; flex-direction: column; align-items: center; min-width: 64px; }

.cnt-num {
  font-family: var(--font-display);
  font-size: 48px;
  font-weight: 900;
  color: var(--gold-light);
  line-height: 1;
}

.cnt-lbl {
  font-family: var(--font-display);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1px;
  color: var(--text-muted);
  text-transform: uppercase;
  margin-top: 2px;
}

.countdown-sep {
  font-family: var(--font-display);
  font-size: 36px;
  font-weight: 900;
  color: var(--gold-dim);
  padding-bottom: 16px;
}

.countdown-sub {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 12px;
  letter-spacing: 1px;
}

/* ── Groups Table ───────────────────────────────────────── */
.groups-grid { display: flex; flex-direction: column; gap: 14px; }

.group-table-card {
  background: var(--bg-card);
  border: 1px solid var(--border-dim);
  border-radius: var(--radius);
  overflow: hidden;
}

.group-table-header {
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 900;
  letter-spacing: 2px;
  color: var(--gold);
  padding: 10px 14px;
  background: rgba(201, 162, 39, 0.08);
  border-bottom: 1px solid var(--border);
}

.group-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

.group-table thead tr {
  background: rgba(255,255,255,0.03);
}

.group-table th {
  font-family: var(--font-display);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  color: var(--text-muted);
  text-transform: uppercase;
  padding: 7px 8px;
  text-align: center;
}

.th-team { text-align: left; padding-left: 14px; }
.th-pts { color: var(--gold); }

.group-table td {
  padding: 8px;
  text-align: center;
  color: var(--text-sec);
  border-top: 1px solid var(--border-dim);
}

.td-team {
  display: flex;
  align-items: center;
  gap: 8px;
  text-align: left;
  padding-left: 14px;
}

.td-pts { color: var(--text-pri); }
.td-pts strong { font-weight: 700; }

.qualify-row td { color: var(--text-pri); }

.brazil-row {
  background: rgba(201, 162, 39, 0.06);
}

.brazil-row td { color: var(--gold-light) !important; }

.pos-num {
  font-family: var(--font-display);
  font-size: 12px;
  font-weight: 700;
  color: var(--text-muted);
  min-width: 14px;
}

.qualify-row .pos-num { color: var(--green); }

.team-flag-sm { font-size: 16px; }
.team-name-sm {
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
}

.qualify-legend {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  font-size: 11px;
  color: var(--text-muted);
  border-top: 1px solid var(--border-dim);
}

.qualify-dot {
  width: 8px; height: 8px;
  background: var(--green);
  border-radius: 2px;
}

/* ── Demo Notice ────────────────────────────────────────── */
.demo-notice {
  background: rgba(201, 162, 39, 0.08);
  border: 1px solid rgba(201, 162, 39, 0.25);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  margin-bottom: 14px;
  font-size: 13px;
  color: var(--gold);
}

.demo-notice a { color: var(--gold-light); text-decoration: underline; cursor: pointer; }

/* ── API Key Banner ─────────────────────────────────────── */
#api-key-banner {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--bg-card2);
  border-top: 1px solid var(--border);
  padding: 14px 16px;
  z-index: 200;
  flex-direction: column;
  gap: 10px;
  max-width: 600px;
  margin: 0 auto;
}

.api-banner-title {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 0.5px;
}

.api-banner-desc {
  font-size: 12px;
  color: var(--text-sec);
  line-height: 1.4;
}

.api-banner-desc a { color: var(--blue-acc); }

.api-input-row {
  display: flex;
  gap: 8px;
}

#api-key-input {
  flex: 1;
  background: var(--bg-deep);
  border: 1px solid var(--border);
  color: var(--text-pri);
  font-family: monospace;
  font-size: 13px;
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  outline: none;
}

#api-key-input:focus { border-color: var(--gold); }
#api-key-input::placeholder { color: var(--text-muted); }

.btn-save-key {
  background: var(--gold);
  color: #000;
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 700;
  padding: 8px 16px;
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
  letter-spacing: 0.5px;
  white-space: nowrap;
}

.btn-close-banner {
  position: absolute;
  top: 10px; right: 14px;
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 20px;
  cursor: pointer;
  line-height: 1;
}

/* ── Toast ──────────────────────────────────────────────── */
#toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--bg-surface);
  border: 1px solid var(--border);
  color: var(--text-pri);
  font-size: 14px;
  padding: 10px 20px;
  border-radius: 50px;
  z-index: 300;
  transition: transform 0.3s ease;
  white-space: nowrap;
  pointer-events: none;
}

#toast.show { transform: translateX(-50%) translateY(0); }

/* ── Refresh Indicator ──────────────────────────────────── */
#refresh-indicator {
  position: fixed;
  top: calc(var(--header-h) + var(--nav-h));
  left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--gold) 0%, var(--green) 100%);
  opacity: 0;
  transition: opacity 0.3s;
  z-index: 90;
  animation: loading-bar 1.5s ease-in-out infinite;
}

@keyframes loading-bar {
  0% { transform: scaleX(0); transform-origin: left; }
  50% { transform: scaleX(1); transform-origin: left; }
  50.01% { transform: scaleX(1); transform-origin: right; }
  100% { transform: scaleX(0); transform-origin: right; }
}

/* ── Last Update ────────────────────────────────────────── */
#last-update {
  font-size: 10px;
  color: var(--text-muted);
  text-align: right;
  padding: 4px 0;
}

/* ── Empty State ────────────────────────────────────────── */
.empty-state {
  text-align: center;
  padding: 48px 20px;
  color: var(--text-muted);
}

.empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty-state p { font-size: 15px; }
.empty-sub { font-size: 13px; margin-top: 6px; }

/* ── Bottom Safe ────────────────────────────────────────── */
.bottom-safe { height: env(safe-area-inset-bottom, 20px); }

/* ── Responsive ─────────────────────────────────────────── */
@media (max-width: 380px) {
  .cnt-num { font-size: 36px; }
  .countdown-unit { min-width: 52px; }
  .team-name { font-size: 13px; }
  .score-num { font-size: 20px; }
}

@media (min-width: 601px) {
  .app-header, .main-nav, #api-key-banner {
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    right: auto;
  }
  .app-main { padding-top: 0; }
  #refresh-indicator { max-width: 600px; left: 50%; transform: translateX(-50%); }
}

  </style>
</head>
<body>

  <!-- Header -->
  <header class="app-header">
    <div class="header-inner">
      <div class="header-brand">
        <div class="trophy-icon" aria-hidden="true">⚽</div>
        <div class="brand-text">
          <span class="brand-title">COPA DO MUNDO</span>
          <span class="brand-year">FIFA 2026™</span>
        </div>
      </div>
      <div class="header-meta">
        <span class="live-badge" id="live-indicator" style="display:none">
          <span class="live-dot"></span>AO VIVO
        </span>
        <div class="host-flags" aria-label="Países-sede">
          <span title="Estados Unidos">🇺🇸</span>
          <span title="México">🇲🇽</span>
          <span title="Canadá">🇨🇦</span>
        </div>
      </div>
    </div>
  </header>

  <!-- Loading bar -->
  <div id="refresh-indicator"></div>

  <!-- Navigation Tabs -->
  <nav class="main-nav" role="navigation" aria-label="Seções do app">
    <button class="nav-tab active" data-tab="ao-vivo" onclick="showTab('ao-vivo')">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4" fill="currentColor"/></svg>
      Ao Vivo

  <script>
// ============================================================
// COPA DO MUNDO 2026 — App Principal
// Integração: API-Football (RapidAPI) + fallback demo
// Auto-refresh a cada 30s durante jogos ao vivo
// ============================================================

// ── Configuração da API ──────────────────────────────────────
const API_CONFIG = {
  // Obtenha sua chave em: https://rapidapi.com/api-sports/api/api-football
  key: localStorage.getItem('apikey_football') || '',
  host: 'api-football-v1.p.rapidapi.com',
  baseUrl: 'https://api-football-v1.p.rapidapi.com/v3',
  // ID da Copa do Mundo 2026 na API-Football (será 1 para WC)
  leagueId: 1,   // World Cup
  season: 2026,
};

// ── Estado Global ────────────────────────────────────────────
let state = {
  matches: [],
  liveMatches: [],
  standings: {},
  activeTab: 'ao-vivo',
  lastUpdate: null,
  refreshInterval: null,
  isLive: false,
  usingDemo: true,
  loading: false,
};

// ── Init ─────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  renderTodayDate();
  renderCountdown();
  setInterval(renderCountdown, 1000);

  if (API_CONFIG.key) {
    state.usingDemo = false;
    fetchAll();
    startAutoRefresh();
  } else {
    loadDemoData();
    showApiKeyBanner();
  }

  showTab('ao-vivo');
});

// ── API Key Management ───────────────────────────────────────
function showApiKeyBanner() {
  const banner = document.getElementById('api-key-banner');
  if (banner) banner.style.display = 'flex';
}

function saveApiKey() {
  const input = document.getElementById('api-key-input');
  const key = input.value.trim();
  if (!key) return;
  localStorage.setItem('apikey_football', key);
  API_CONFIG.key = key;
  state.usingDemo = false;
  document.getElementById('api-key-banner').style.display = 'none';
  showToast('✅ Chave salva! Buscando dados ao vivo...');
  fetchAll();
  startAutoRefresh();
}

// ── Fetch All Data ───────────────────────────────────────────
async function fetchAll() {
  try {
    setLoadingState(true);
    await Promise.all([
      fetchLiveMatches(),
      fetchTodayMatches(),
      fetchFixtures(),
      fetchStandings(),
    ]);
    state.lastUpdate = new Date();
    updateLastUpdateTime();
    setLoadingState(false);
  } catch (err) {
    console.error('Erro ao buscar dados:', err);
    setLoadingState(false);
    if (state.matches.length === 0) loadDemoData();
  }
}

async function apiGet(endpoint, params = {}) {
  const url = new URL(`${API_CONFIG.baseUrl}${endpoint}`);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));

  const res = await fetch(url.toString(), {
    headers: {
      'X-RapidAPI-Key': API_CONFIG.key,
      'X-RapidAPI-Host': API_CONFIG.host,
    }
  });

  if (!res.ok) throw new Error(`API error: ${res.status}`);
  const data = await res.json();
  if (data.errors && Object.keys(data.errors).length > 0) {
    throw new Error(JSON.stringify(data.errors));
  }
  return data.response || [];
}

// ── Live Matches ─────────────────────────────────────────────
async function fetchLiveMatches() {
  const data = await apiGet('/fixtures', {
    live: 'all',
    league: API_CONFIG.leagueId,
    season: API_CONFIG.season,
  });
  state.liveMatches = data.map(normalizeMatch);
  state.isLive = state.liveMatches.length > 0;
  document.getElementById('live-indicator').style.display = state.isLive ? 'flex' : 'none';
  renderLiveTab();
}

// ── Today's Matches ──────────────────────────────────────────
async function fetchTodayMatches() {
  const today = new Date().toISOString().slice(0, 10);
  const data = await apiGet('/fixtures', {
    date: today,
    league: API_CONFIG.leagueId,
    season: API_CONFIG.season,
  });
  const todayMatches = data.map(normalizeMatch);
  // Merge with live (live has more data)
  const liveIds = new Set(state.liveMatches.map(m => m.id));
  const notLive = todayMatches.filter(m => !liveIds.has(m.id));
  state.liveMatches = [...state.liveMatches, ...notLive];
  renderLiveTab();
}

// ── All Fixtures ─────────────────────────────────────────────
async function fetchFixtures() {
  const data = await apiGet('/fixtures', {
    league: API_CONFIG.leagueId,
    season: API_CONFIG.season,
  });
  state.matches = data.map(normalizeMatch);
  renderCalendar();
  renderResults();
}

// ── Standings ────────────────────────────────────────────────
async function fetchStandings() {
  const data = await apiGet('/standings', {
    league: API_CONFIG.leagueId,
    season: API_CONFIG.season,
  });
  // data[0] contains league standings
  if (data[0]?.league?.standings) {
    const groups = {};
    data[0].league.standings.forEach(group => {
      const groupName = group[0]?.group?.replace('Group ', '') || '?';
      groups[groupName] = group.map(t => ({
        team: t.team.name,
        flag: getFlag(t.team.name),
        played: t.all.played,
        won: t.all.win,
        drawn: t.all.draw,
        lost: t.all.lose,
        gf: t.all.goals.for,
        ga: t.all.goals.against,
        gd: t.goalsDiff,
        points: t.points,
      }));
    });
    state.standings = groups;
    renderGroups();
  }
}

// ── Normalize Match from API ─────────────────────────────────
function normalizeMatch(m) {
  const status = m.fixture?.status?.short || 'NS';
  const elapsed = m.fixture?.status?.elapsed;

  let appStatus = 'upcoming';
  if (['1H', '2H', 'HT', 'ET', 'P', 'BT'].includes(status)) appStatus = 'live';
  else if (['FT', 'AET', 'PEN'].includes(status)) appStatus = 'finished';

  const fixtureDate = new Date(m.fixture?.date);
  const dateStr = fixtureDate.toISOString().slice(0, 10);
  // Convert to BRT (UTC-3)
  const brtTime = new Date(fixtureDate.getTime() - 0); // keep original, display as BRT
  const hours = brtTime.toLocaleTimeString('pt-BR', { timeZone: 'America/Sao_Paulo', hour: '2-digit', minute: '2-digit' });

  const events = (m.events || []).map(ev => ({
    type: ev.type,
    detail: ev.detail,
    minute: ev.time?.elapsed,
    player: ev.player?.name,
    team: ev.team?.name,
  }));

  const group = m.league?.round?.includes('Group') 
    ? m.league.round.split('Group ')[1]?.[0] 
    : null;

  return {
    id: m.fixture?.id,
    group: group,
    phase: detectPhase(m.league?.round || ''),
    highlight: ['Brazil', 'Brasil'].includes(m.teams?.home?.name) || ['Brazil', 'Brasil'].includes(m.teams?.away?.name),
    home: {
      name: m.teams?.home?.name || '?',
      flag: getFlag(m.teams?.home?.name),
      code: m.teams?.home?.name?.slice(0, 3).toUpperCase(),
    },
    away: {
      name: m.teams?.away?.name || '?',
      flag: getFlag(m.teams?.away?.name),
      code: m.teams?.away?.name?.slice(0, 3).toUpperCase(),
    },
    date: dateStr,
    time: hours,
    timezone: 'BRT',
    venue: m.fixture?.venue?.name || '',
    city: m.fixture?.venue?.city || '',
    status: appStatus,
    score: appStatus !== 'upcoming' ? {
      home: m.goals?.home ?? 0,
      away: m.goals?.away ?? 0,
    } : null,
    minute: elapsed ? `${elapsed}'` : getStatusLabel(status),
    events,
  };
}

function detectPhase(round) {
  if (round.includes('Group')) return 'grupos';
  if (round.includes('Round of 16') || round.includes('16')) return 'oitavas';
  if (round.includes('Quarter')) return 'quartas';
  if (round.includes('Semi')) return 'semi';
  if (round.includes('Final') && !round.includes('Semi')) return 'final';
  return 'grupos';
}

function getStatusLabel(short) {
  const map = { 'NS': null, 'HT': 'Intervalo', 'FT': 'Encerrado', 'AET': 'Prorrogação', 'PEN': 'Pênaltis', 'PST': 'Adiado' };
  return map[short] || short;
}

// ── Auto Refresh ─────────────────────────────────────────────
function startAutoRefresh() {
  stopAutoRefresh();
  state.refreshInterval = setInterval(async () => {
    // Se há jogo ao vivo, atualiza tudo; senão, só verifica ao vivo
    if (state.isLive) {
      await fetchAll();
    } else {
      await fetchLiveMatches();
      await fetchTodayMatches();
    }
  }, 30000); // 30 segundos
}

function stopAutoRefresh() {
  if (state.refreshInterval) clearInterval(state.refreshInterval);
}

// ── Demo Data (sem chave de API) ─────────────────────────────
function loadDemoData() {
  state.matches = DEMO_MATCHES;
  state.liveMatches = DEMO_MATCHES.filter(m => m.status === 'live');
  // Build demo standings
  Object.keys(GROUPS).forEach(g => {
    state.standings[g] = GROUPS[g].teams.map((team, i) => ({
      team,
      flag: GROUPS[g].flags[i],
      played: 0, won: 0, drawn: 0, lost: 0,
      gf: 0, ga: 0, gd: 0, points: 0,
    }));
  });
  renderAll();
}

// ── Render All ───────────────────────────────────────────────
function renderAll() {
  renderLiveTab();
  renderCalendar();
  renderResults();
  renderGroups();
}

// ── Tab Navigation ───────────────────────────────────────────
function showTab(tab) {
  state.activeTab = tab;
  document.querySelectorAll('.tab-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
  document.getElementById(`tab-${tab}`)?.classList.add('active');
  document.querySelector(`[data-tab="${tab}"]`)?.classList.add('active');
}

// ── Today / Live Tab ─────────────────────────────────────────
function renderLiveTab() {
  const container = document.getElementById('live-games-container');
  if (!container) return;

  const today = new Date().toISOString().slice(0, 10);
  const todayMatches = state.usingDemo
    ? state.matches
    : state.matches.filter(m => m.date === today);

  const live = todayMatches.filter(m => m.status === 'live');
  const upcoming = todayMatches.filter(m => m.status === 'upcoming');
  const finished = todayMatches.filter(m => m.status === 'finished');

  let html = '';

  if (state.usingDemo) {
    html += `<div class="demo-notice">
      <span>📡 Modo demonstração — <a href="#" onclick="openApiModal()">Configure sua chave de API</a> para dados ao vivo</span>
    </div>`;
    // Show countdown
    html += renderCountdownCard();
    html += renderMatchSection('📅 Próximos Jogos do Brasil', state.matches.filter(m => m.highlight));
  } else {
    if (live.length > 0) html += renderMatchSection('🔴 Ao Vivo Agora', live);
    if (upcoming.length > 0) html += renderMatchSection('📅 Hoje — Próximos', upcoming);
    if (finished.length > 0) html += renderMatchSection('✅ Hoje — Encerrados', finished);
    if (live.length === 0 && upcoming.length === 0 && finished.length === 0) {
      html += `<div class="empty-state"><div class="empty-icon">📭</div><p>Nenhum jogo hoje</p></div>`;
    }
  }

  container.innerHTML = html;
}

function renderCountdownCard() {
  const now = new Date();
  const diff = COPA_START - now;
  if (diff <= 0) return '';
  const days = Math.floor(diff / 86400000);
  const hours = Math.floor((diff % 86400000) / 3600000);
  const mins = Math.floor((diff % 3600000) / 60000);
  const secs = Math.floor((diff % 60000) / 1000);
  return `<div class="countdown-card" id="countdown-card">
    <div class="countdown-label">⏱️ Copa começa em</div>
    <div class="countdown-numbers">
      <div class="countdown-unit"><span class="cnt-num" id="cnt-days">${days}</span><span class="cnt-lbl">dias</span></div>
      <div class="countdown-sep">:</div>
      <div class="countdown-unit"><span class="cnt-num" id="cnt-hours">${String(hours).padStart(2,'0')}</span><span class="cnt-lbl">horas</span></div>
      <div class="countdown-sep">:</div>
      <div class="countdown-unit"><span class="cnt-num" id="cnt-mins">${String(mins).padStart(2,'0')}</span><span class="cnt-lbl">min</span></div>
      <div class="countdown-sep">:</div>
      <div class="countdown-unit"><span class="cnt-num" id="cnt-secs">${String(secs).padStart(2,'0')}</span><span class="cnt-lbl">seg</span></div>
    </div>
    <div class="countdown-sub">11 de junho · Los Angeles</div>
  </div>`;
}

function renderCountdown() {
  const now = new Date();
  const diff = COPA_START - now;
  if (diff <= 0) return;
  const days = Math.floor(diff / 86400000);
  const hours = Math.floor((diff % 86400000) / 3600000);
  const mins = Math.floor((diff % 3600000) / 60000);
  const secs = Math.floor((diff % 60000) / 1000);
  const set = (id, val, pad=false) => {
    const el = document.getElementById(id);
    if (el) el.textContent = pad ? String(val).padStart(2,'0') : val;
  };
  set('cnt-days', days);
  set('cnt-hours', hours, true);
  set('cnt-mins', mins, true);
  set('cnt-secs', secs, true);
}

function renderMatchSection(title, matches) {
  if (!matches.length) return '';
  return `<div class="match-section">
    <div class="match-section-header">${title}</div>
    ${matches.map(renderMatchCard).join('')}
  </div>`;
}

function renderMatchCard(m) {
  const isLive = m.status === 'live';
  const isFinished = m.status === 'finished';
  const isBrasil = m.highlight;

  const scoreHtml = m.score
    ? `<div class="score-display ${isLive ? 'score-live' : ''}">
        <span class="score-num">${m.score.home}</span>
        <span class="score-sep">—</span>
        <span class="score-num">${m.score.away}</span>
       </div>`
    : `<div class="score-display score-upcoming">
        <span class="match-time">${m.time}</span>
        <span class="match-tz">${m.timezone}</span>
       </div>`;

  const statusBadge = isLive
    ? `<span class="badge badge-live"><span class="pulse-dot"></span>${m.minute}</span>`
    : isFinished
    ? `<span class="badge badge-done">FT</span>`
    : `<span class="badge badge-upcoming">${m.time}</span>`;

  const eventsHtml = m.events?.length
    ? `<div class="match-events">${m.events.slice(0, 6).map(ev => {
        const icon = ev.type === 'Goal' ? '⚽' : ev.type === 'Card' && ev.detail?.includes('Yellow') ? '🟨' : ev.type === 'Card' ? '🟥' : '🔄';
        return `<span class="event-chip">${icon} ${ev.minute}' ${ev.player?.split(' ').pop() || ''}</span>`;
      }).join('')}</div>`
    : '';

  return `<div class="match-card ${isBrasil ? 'match-brazil' : ''} ${isLive ? 'match-live-card' : ''}">
    <div class="match-card-top">
      <div class="match-meta">
        ${m.group ? `<span class="group-badge">Grupo ${m.group}</span>` : `<span class="group-badge">${m.phase}</span>`}
        ${statusBadge}
      </div>
      <div class="match-venue">${m.city || m.venue}</div>
    </div>
    <div class="match-teams">
      <div class="team-side team-home">
        <span class="team-flag">${m.home.flag}</span>
        <span class="team-name">${m.home.name}</span>
      </div>
      ${scoreHtml}
      <div class="team-side team-away">
        <span class="team-name">${m.away.name}</span>
        <span class="team-flag">${m.away.flag}</span>
      </div>
    </div>
    ${eventsHtml}
  </div>`;
}

// ── Calendar Tab ─────────────────────────────────────────────
function renderCalendar() {
  const container = document.getElementById('calendar-container');
  if (!container) return;

  const phaseFilter = document.getElementById('phase-filter')?.value || 'todos';
  const groupFilter = document.getElementById('group-filter')?.value || 'todos';

  let matches = state.matches.filter(m => m.status === 'upcoming' || m.status === 'live');
  if (phaseFilter !== 'todos') matches = matches.filter(m => m.phase === phaseFilter);
  if (groupFilter !== 'todos') matches = matches.filter(m => m.group === groupFilter);

  if (!matches.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">🗓️</div><p>Nenhum jogo encontrado</p></div>`;
    return;
  }

  // Group by date
  const byDate = {};
  matches.forEach(m => {
    if (!byDate[m.date]) byDate[m.date] = [];
    byDate[m.date].push(m);
  });

  container.innerHTML = Object.keys(byDate).sort().map(date => {
    const label = formatDateLabel(date);
    return `<div class="date-group">
      <div class="date-label">${label}</div>
      ${byDate[date].map(renderMatchCard).join('')}
    </div>`;
  }).join('');
}

// ── Results Tab ──────────────────────────────────────────────
function renderResults() {
  const container = document.getElementById('results-container');
  if (!container) return;

  const finished = state.matches.filter(m => m.status === 'finished');

  if (!finished.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">⏳</div><p>Nenhum resultado ainda</p><p class="empty-sub">Os resultados aparecerão aqui após os jogos</p></div>`;
    return;
  }

  const byDate = {};
  finished.forEach(m => {
    if (!byDate[m.date]) byDate[m.date] = [];
    byDate[m.date].push(m);
  });

  container.innerHTML = Object.keys(byDate).sort().reverse().map(date => {
    const label = formatDateLabel(date);
    return `<div class="date-group">
      <div class="date-label">${label}</div>
      ${byDate[date].map(renderMatchCard).join('')}
    </div>`;
  }).join('');
}

// ── Groups Tab ───────────────────────────────────────────────
function renderGroups() {
  const container = document.getElementById('groups-container');
  if (!container) return;

  const groups = Object.keys(state.standings).sort();
  if (!groups.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">🏆</div><p>Carregando grupos...</p></div>`;
    return;
  }

  container.innerHTML = groups.map(g => {
    const teams = state.standings[g] || [];
    return `<div class="group-table-card">
      <div class="group-table-header">GRUPO ${g}</div>
      <table class="group-table">
        <thead>
          <tr>
            <th class="th-team">Seleção</th>
            <th title="Jogos">J</th>
            <th title="Vitórias">V</th>
            <th title="Empates">E</th>
            <th title="Derrotas">D</th>
            <th title="Gols marcados">GP</th>
            <th title="Gols sofridos">GC</th>
            <th title="Saldo">SG</th>
            <th title="Pontos" class="th-pts">PTS</th>
          </tr>
        </thead>
        <tbody>
          ${teams.map((t, i) => `
            <tr class="${i < 2 ? 'qualify-row' : ''} ${['Brazil','Brasil'].includes(t.team) ? 'brazil-row' : ''}">
              <td class="td-team">
                <span class="pos-num">${i + 1}</span>
                <span class="team-flag-sm">${t.flag}</span>
                <span class="team-name-sm">${t.team}</span>
              </td>
              <td>${t.played}</td>
              <td>${t.won}</td>
              <td>${t.drawn}</td>
              <td>${t.lost}</td>
              <td>${t.gf}</td>
              <td>${t.ga}</td>
              <td>${t.gd >= 0 ? '+' : ''}${t.gd}</td>
              <td class="td-pts"><strong>${t.points}</strong></td>
            </tr>`).join('')}
        </tbody>
      </table>
      <div class="qualify-legend"><span class="qualify-dot"></span>Classificam para oitavas</div>
    </div>`;
  }).join('');
}

// ── Helpers ──────────────────────────────────────────────────
function renderTodayDate() {
  const el = document.getElementById('today-date');
  if (el) el.textContent = new Date().toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });
}

function formatDateLabel(dateStr) {
  const date = new Date(dateStr + 'T12:00:00');
  const today = new Date();
  const tomorrow = new Date(today);
  tomorrow.setDate(today.getDate() + 1);
  const todayStr = today.toISOString().slice(0, 10);
  const tomorrowStr = tomorrow.toISOString().slice(0, 10);
  if (dateStr === todayStr) return '🔥 Hoje';
  if (dateStr === tomorrowStr) return '⏭️ Amanhã';
  return date.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });
}

function setLoadingState(loading) {
  state.loading = loading;
  const indicator = document.getElementById('refresh-indicator');
  if (indicator) indicator.style.opacity = loading ? '1' : '0';
}

function updateLastUpdateTime() {
  const el = document.getElementById('last-update');
  if (el && state.lastUpdate) {
    el.textContent = `Atualizado ${state.lastUpdate.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}`;
  }
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  if (!toast) return;
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

function openApiModal() {
  document.getElementById('api-key-banner').style.display = 'flex';
}
