<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a1628" />
  <meta name="description" content="Copa do Mundo 2026 — Calendário, Resultados e Ao Vivo" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Copa 2026" />
  <!-- Open Graph -->
  <meta property="og:title" content="Copa do Mundo 2026" />
  <meta property="og:description" content="Calendário, resultados e placar ao vivo — FIFA World Cup 2026" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://seu-usuario.github.io/copa2026/" />
  <meta property="og:image" content="https://seu-usuario.github.io/copa2026/icons/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://seu-usuario.github.io/copa2026/icons/og-image.png" />
  <title>Copa do Mundo 2026</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Header -->
  <header class="app-header">
    <div class="header-inner">
      <div class="header-brand">
        <div class="trophy-icon" aria-hidden="true">⚽</div>
        <div class="brand-text">
          <span class="brand-title">COPA DO MUNDO</span>
          <span class="brand-year">FIFA 2026™</span>
        </div>
      </div>
      <div class="header-meta">
        <button id="search-btn" aria-label="Buscar jogos" onclick="openSearch()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
        <span class="live-badge" id="live-indicator" style="display:none">
          <span class="live-dot"></span>AO VIVO
        </span>
        <div class="host-flags" aria-label="Países-sede">
          <span title="Estados Unidos">🇺🇸</span>
          <span title="México">🇲🇽</span>
          <span title="Canadá">🇨🇦</span>
        </div>
      </div>
    </div>
  </header>

  <!-- Loading bar -->
  <div id="refresh-indicator"></div>

  <!-- #10 Widget Brasil fixo -->
  <div id="brasil-widget" aria-label="Próximo jogo do Brasil">
    <span class="widget-label">🇧🇷 BRASIL</span>
    <div class="widget-inner" id="widget-inner">
      <!-- preenchido por JS -->
    </div>
  </div>

  <!-- #8 Search overlay -->
  <div id="search-overlay" role="dialog" aria-label="Buscar jogos" onclick="closeSearch()">
    <div class="search-header" onclick="event.stopPropagation()">
      <div class="search-input-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="search-input" type="search" placeholder="Time, data, estádio…" autocomplete="off"
          oninput="handleSearch(this.value)" />
        <button id="search-clear" onclick="clearSearch()" aria-label="Limpar">✕</button>
      </div>
      <button class="search-cancel" onclick="closeSearch()">Cancelar</button>
    </div>
    <div class="search-results" id="search-results" onclick="event.stopPropagation()">
      <div class="search-hint">
        <div class="hint-icon">🔍</div>
        <p>Digite o nome de um time,<br>cidade ou data</p>
      </div>
    </div>
  </div>

  <!-- Navigation Tabs -->
  <nav class="main-nav" role="navigation" aria-label="Seções do app">
    <button class="nav-tab active" data-tab="ao-vivo" onclick="showTab('ao-vivo')">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4" fill="currentColor"/></svg>
      Ao Vivo
    </button>
    <button class="nav-tab" data-tab="calendario" onclick="showTab('calendario')">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Calendário
    </button>
    <button class="nav-tab" data-tab="resultados" onclick="showTab('resultados')">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Resultados
    </button>
    <button class="nav-tab" data-tab="grupos" onclick="showTab('grupos')">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Grupos
    </button>
  </nav>

  <!-- Main Content -->
  <main class="app-main">

    <!-- #9 Banner de notificações -->
    <div id="notif-banner">
      <div class="notif-text"><strong>Ativar notificações?</strong><br>Avise quando o Brasil jogar ou marcar um gol.</div>
      <button class="notif-allow" onclick="requestNotifPermission()">Ativar</button>
      <button class="notif-dismiss" onclick="dismissNotifBanner()" aria-label="Fechar">✕</button>
    </div>

    <!-- Last update timestamp -->
    <div id="last-update"></div>

    <!-- AO VIVO TAB -->
    <section id="tab-ao-vivo" class="tab-section active">
      <div class="section-header">
        <h2 class="section-title">Jogos de Hoje</h2>
        <span class="section-date" id="today-date"></span>
      </div>
      <div id="live-games-container" class="games-list"></div>
    </section>

    <!-- CALENDÁRIO TAB -->
    <section id="tab-calendario" class="tab-section">
      <div class="section-header">
        <h2 class="section-title">Calendário</h2>
        <div class="filter-row">
          <select id="phase-filter" class="filter-select" onchange="renderCalendar()">

            <option value="oitavas">Oitavas de Final</option>
            <option value="quartas">Quartas de Final</option>
            <option value="semi">Semifinais</option>
            <option value="final">Final</option>
          </select>
          <select id="group-filter" class="filter-select" onchange="renderCalendar()">
            <option value="todos">Todos os grupos</option>
            <option value="A">Grupo A</option>
            <option value="B">Grupo B</option>
            <option value="C">Grupo C</option>
            <option value="D">Grupo D</option>
            <option value="E">Grupo E</option>
            <option value="F">Grupo F</option>
            <option value="G">Grupo G 🇧🇷</option>
            <option value="H">Grupo H</option>
            <option value="I">Grupo I</option>
            <option value="J">Grupo J</option>
            <option value="K">Grupo K</option>
            <option value="L">Grupo L</option>
          </select>
          <select id="team-filter" class="filter-select" onchange="renderCalendar()">
            <option value="todos">Todas as seleções</option>
            <option value="Brasil">🇧🇷 Brasil</option>
            <option value="Argentina">🇦🇷 Argentina</option>
            <option value="França">🇫🇷 França</option>
            <option value="Alemanha">🇩🇪 Alemanha</option>
            <option value="Espanha">🇪🇸 Espanha</option>
            <option value="Portugal">🇵🇹 Portugal</option>
            <option value="Inglaterra">🏴󠁧󠁢󠁥󠁮󠁧󠁿 Inglaterra</option>
            <option value="Holanda">🇳🇱 Holanda</option>
            <option value="Bélgica">🇧🇪 Bélgica</option>
            <option value="Croácia">🇭🇷 Croácia</option>
            <option value="Marrocos">🇲🇦 Marrocos</option>
            <option value="Senegal">🇸🇳 Senegal</option>
            <option value="Japão">🇯🇵 Japão</option>
            <option value="Coreia do Sul">🇰🇷 Coreia do Sul</option>
            <option value="México">🇲🇽 México</option>
            <option value="EUA">🇺🇸 EUA</option>
            <option value="Canadá">🇨🇦 Canadá</option>
            <option value="Equador">🇪🇨 Equador</option>
            <option value="Uruguai">🇺🇾 Uruguai</option>
            <option value="Colômbia">🇨🇴 Colômbia</option>
            <option value="Paraguai">🇵🇾 Paraguai</option>
            <option value="Suíça">🇨🇭 Suíça</option>
            <option value="Dinamarca">🇩🇰 Dinamarca</option>
            <option value="Noruega">🇳🇴 Noruega</option>
            <option value="Turquia">🇹🇷 Turquia</option>
            <option value="Ucrânia">🇺🇦 Ucrânia</option>
            <option value="Itália">🇮🇹 Itália</option>
            <option value="Austrália">🇦🇺 Austrália</option>
            <option value="Catar">🇶🇦 Catar</option>
            <option value="Arábia Saudita">🇸🇦 Arábia Saudita</option>
            <option value="Irã">🇮🇷 Irã</option>
            <option value="Egito">🇪🇬 Egito</option>
            <option value="Tunísia">🇹🇳 Tunísia</option>
            <option value="Gana">🇬🇭 Gana</option>
            <option value="África do Sul">🇿🇦 África do Sul</option>
            <option value="Costa do Marfim">🇨🇮 Costa do Marfim</option>
            <option value="Escócia">🏴󠁧󠁢󠁳󠁣󠁴󠁿 Escócia</option>
            <option value="Haiti">🇭🇹 Haiti</option>
            <option value="Cabo Verde">🇨🇻 Cabo Verde</option>
            <option value="Jordânia">🇯🇴 Jordânia</option>
            <option value="Iraque">🇮🇶 Iraque</option>
            <option value="Uzbequistão">🇺🇿 Uzbequistão</option>
            <option value="Rep. D. Congo">🇨🇩 Rep. D. Congo</option>
            <option value="Panamá">🇵🇦 Panamá</option>
            <option value="Curaçao">🇨🇼 Curaçao</option>
            <option value="Argélia">🇩🇿 Argélia</option>
            <option value="Áustria">🇦🇹 Áustria</option>
            <option value="Nova Zelândia">🇳🇿 Nova Zelândia</option>
          </select>
        </div>
      </div>
      <div id="calendar-container" class="games-list"></div>
    </section>

    <!-- RESULTADOS TAB -->
    <section id="tab-resultados" class="tab-section">
      <div class="section-header">
        <h2 class="section-title">Resultados</h2>
      </div>
      <div id="results-container" class="games-list"></div>
    </section>

    <!-- GRUPOS TAB -->
    <section id="tab-grupos" class="tab-section">
      <div class="section-header">
        <h2 class="section-title">Fase de Grupos</h2>
        <p class="section-subtitle">48 seleções · 12 grupos · 104 jogos</p>
      </div>
      <div id="groups-container" class="groups-grid"></div>
    </section>

  </main>

  <!-- Bottom safe area -->
  <div class="bottom-safe"></div>

  <!-- Toast -->
  <div id="toast"></div>

  <!-- Scripts: data primeiro, depois app -->
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(r => console.log('[SW] Registrado:', r.scope))
          .catch(e => console.error('[SW] Erro:', e));
      });
    }
  </script>

  <!-- Corrige URLs do Open Graph para o domínio real em tempo de execução -->
  <script>
    (function () {
      const base = window.location.origin + window.location.pathname.replace(/\/$/, '');
      ['og:url', 'og:image', 'twitter:image'].forEach(name => {
        const sel = name.startsWith('og:')
          ? `meta[property="${name}"]`
          : `meta[name="${name}"]`;
        const el = document.querySelector(sel);
        if (!el) return;
        const content = el.getAttribute('content');
        if (content && content.includes('seu-usuario')) {
          el.setAttribute('content',
            content.replace('https://seu-usuario.github.io/copa2026', base)
          );
        }
      });
    })();
  </script>
</body>
</html>
